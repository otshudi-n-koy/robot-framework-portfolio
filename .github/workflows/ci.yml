name: Robot Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    name: API Tests (RequestsLibrary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install robotframework robotframework-requests
      - name: Run API tests
        run: robot --outputdir results/api tests/api
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: results/api

  ui-selenium-tests:
    name: UI Tests (SeleniumLibrary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install robotframework robotframework-seleniumlibrary
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run Selenium UI tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: robot --outputdir results/ui-selenium tests/ui/selenium

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-selenium-report
          path: results/ui-selenium

  ui-browser-tests:
    name: UI Tests (Browser Library / Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install robotframework robotframework-browser
          rfbrowser init
      - name: Run Browser Library UI tests
        run: robot --outputdir results/ui-browser tests/ui/browser
      - name: Upload Browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-browser-report
          path: results/ui-browser